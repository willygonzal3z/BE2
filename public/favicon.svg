<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Flame -->
  <path d="M13.5 23 Q16 30 18.5 23 Q16 26 13.5 23Z" fill="url(#fire)"/>

  <!-- Left fin -->
  <path d="M12 17 L7.5 24 L12 21.5Z" fill="white" opacity="0.9"/>

  <!-- Right fin -->
  <path d="M20 17 L24.5 24 L20 21.5Z" fill="white" opacity="0.9"/>

  <!-- Rocket body -->
  <rect x="12" y="12" width="8" height="10" rx="1" fill="white"/>

  <!-- Nose cone -->
  <path d="M16 2.5 L21 12 L11 12Z" fill="white"/>

  <!-- Porthole window -->
  <circle cx="16" cy="16" r="2.2" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="1.2" fill="white" opacity="0.25"/>
</svg>
